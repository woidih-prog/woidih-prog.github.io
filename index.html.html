<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Master V5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04040d;color:#e0e0e0;font-family:Arial,sans-serif;min-height:100vh;padding-bottom:60px}
button{cursor:pointer;border:none;outline:none;transition:all .2s}
button:hover:not(:disabled){transform:translateY(-2px)}
button:disabled{opacity:.4;cursor:not-allowed}
.header{background:#04040d;border-bottom:1px solid #0c0c1e;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#00ff88,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:16px}
.title{font-size:12px;font-weight:900;letter-spacing:2px;color:#fff;font-family:monospace}
.subtitle{font-size:7px;color:#333;letter-spacing:3px}
.tabs{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap}
.tab{background:#07071a;border:1px solid #0c0c1e;color:#444;border-radius:7px;padding:6px 12px;font-size:10px;font-weight:700;font-family:monospace}
.tab.active{background:#00ff8818;border-color:#00ff88;color:#00ff88}
.container{max-width:1040px;margin:0 auto;padding:18px 14px}
.card{background:#07071a;border:1px solid #0c0c1e;border-radius:12px;padding:16px 18px;margin-bottom:16px}
.label{font-size:7px;color:#222;letter-spacing:2.5px;margin-bottom:6px}
.pairs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.pair-btn{background:#0a0a1a;border:1px solid #0d0d1f;color:#444;border-radius:5px;padding:4px 8px;font-size:9px;font-weight:700;font-family:monospace}
.pair-btn.active{background:#00ff8818;border-color:#00ff88;color:#00ff88}
.tf-btn{background:#0a0a1a;border:1px solid #0d0d1f;color:#444;border-radius:5px;padding:4px 9px;font-size:9px;font-weight:700;font-family:monospace}
.tf-btn.active{background:#a78bfa18;border-color:#a78bfa;color:#a78bfa}
.btn-launch{background:linear-gradient(135deg,#00ff88,#00cc55);color:#000;border-radius:8px;padding:10px 18px;font-size:11px;font-weight:900;letter-spacing:1.5px;font-family:monospace;box-shadow:0 0 16px #00ff8830}
.btn-launch:disabled{background:#0a0a1a;color:#333;box-shadow:none}
.btn-enquete{width:100%;background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;border-radius:10px;padding:13px;font-size:12px;font-weight:900;letter-spacing:1.5px;font-family:monospace;box-shadow:0 0 20px #a78bfa40;margin-bottom:16px}
.btn-tg{background:#07071a;border:1px solid #1a1a2e;color:#555;border-radius:6px;padding:5px 10px;font-size:9px;font-family:monospace;font-weight:700}
.btn-tg.ok{background:#00ff8820;border-color:#00ff88;color:#00ff88}
.btn-tg.err{background:#ff444420;border-color:#ff4444;color:#ff4444}
.step-bar{display:flex;align-items:center;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
.step{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:50px}
.step-circle{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;transition:all .3s}
.step-line{width:10px;height:2px;margin-bottom:13px;transition:background .3s}
.step-label{font-size:7px;white-space:nowrap}
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:18px}
.agent-card{background:#09091a;border-radius:12px;padding:14px 16px;transition:all .4s ease}
.agent-bar{height:3px;background:#111;border-radius:2px;margin-bottom:9px}
.agent-fill{height:100%;border-radius:2px;transition:width 1s ease}
.chip{border-radius:4px;padding:2px 7px;font-size:10px;font-family:monospace;white-space:nowrap}
.signal-banner{border-radius:14px;padding:18px 20px;margin-bottom:20px}
.signal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:12px}
.signal-box{border-radius:9px;padding:12px;text-align:center}
.decision-panel{border-radius:14px;padding:20px 22px;margin-bottom:18px}
.decision-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px}
.stat-box{background:#07071a;border:1px solid #0c0c1e;border-radius:8px;padding:12px;text-align:center}
.trade-item{background:#07071a;border:1px solid #0c0c1e;border-radius:7px;padding:9px 12px;margin-bottom:5px}
.error-box{background:#ff000010;border:1px solid #ff000030;border-radius:8px;padding:10px 14px;color:#ff4444;font-size:11px;margin-bottom:14px}
.data-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px}
.data-box{background:#04040d;border-radius:5px;padding:6px 8px;border:1px solid #0d0d1f}
.footer{margin-top:36px;padding:10px 14px;background:#06060f;border-radius:6px;text-align:center;font-size:8px;color:#151525}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.pulse{animation:pulse 1.4s ease infinite}
</style>
</head>

</div>

<script>

// Init pairs & TF buttons
function initControls(){
  const pc = document.getElementById('pairsContainer');
  ALL_PAIRS.forEach(p => {

    b.className = 'pair-btn' + (p===selectedPair?' active':'');

function showTab(name, btn){
  ['enqueteur','orchestrateur','memoire','stats'].forEach(t => document.getElementById('tab-'+t).style.display='none');

  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(name==='memoire') renderTrades();
  if(name==='stats') renderStats();
}

async function aiCall(sys,prompt,maxT=800){
  const r = await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxT,system:sys,messages:[{role:'user',content:prompt}]})});
  const d = await r.json();
  if(d.error) throw new Error(d.error.message);
  const text = (d.content||[]).map(b=>b.text||'').join('');
  const t=text.trim().replace(/^```\w*\n?/m,'').replace(/\n?```$/m,'').trim();
  const s=t.indexOf('{'),e=t.lastIndexOf('}');
  if(s===-1||e===-1) throw new Error('Pas de JSON');
  try{return JSON.parse(t.slice(s,e+1));}
  catch(x){return JSON.parse(t.slice(s,e+1).replace(/,\s*}/g,'}').replace(/,\s*]/g,']'));}
}

const ENQUETEUR_SYS=`Tu es L'ENQUÊTEUR, agent de renseignement des marchés financiers. JSON UNIQUEMENT: {"session_actuelle":"...","sentiment":"risk-on","dxy":"hausse","resume_macro":"2 phrases max","evenements_jour":[{"heure":"14h30","event":"NFP","impact":"fort","paire_impactee":"USD"}],"top_opportunites":[{"rang":1,"paire":"EUR/USD","direction":"ACHETER","raison":"1 phrase","session_ideale":"London Open","score_opportunite":82,"alerte":""}],"paires_eviter":[{"paire":"USD/JPY","raison":"texte court"}],"conseil_du_jour":"1 phrase"}`;

async function runEnquete(){
  const btn = document.getElementById('btnEnquete');
  btn.disabled=true; btn.textContent='🔍 ENQUÊTE...';
  document.getElementById('enqueteResult').innerHTML='';
  const now=new Date(),h=now.getHours();
  const sess=h>=7&&h<10?'London Open':h>=13&&h<16?'NY Open':h>=2&&h<6?'Asian Session':'Inter-session';
  const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  try{
    const r=await aiCall(ENQUETEUR_SYS,'Date:'+now.toLocaleDateString('fr-FR')+' Heure:'+now.toLocaleTimeString('fr-FR')+' Session:'+sess+' Jour:'+days[now.getDay()]+'\nPaires: '+ALL_PAIRS.join(', ')+'\nJSON uniquement.',2000);
    renderEnquete(r);
  }catch(e){document.getElementById('enqueteResult').innerHTML=`<div class="error-box">⚠ ${e.message}</div>`;}
  btn.disabled=false; btn.textContent='🔍 LANCER L\'ENQUÊTE';
}

function renderEnquete(r){
  const sentColor=r.sentiment==='risk-on'?'#00ff88':r.sentiment==='risk-off'?'#ff4444':'#f5c518';
  let html=`<div class="card" style="margin-bottom:14px">
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <span class="chip" style="background:${sentColor}20;border:1px solid ${sentColor}40;color:${sentColor}">${r.session_actuelle||'—'}</span>
      <span class="chip" style="background:${sentColor}20;border:1px solid ${sentColor}40;color:${sentColor}">Sentiment: ${r.sentiment||'—'}</span>
      <span class="chip" style="background:#88888820;border:1px solid #88888840;color:#888">DXY: ${r.dxy||'—'}</span>
    </div>
    <p style="font-size:11px;color:#777;line-height:1.6">${r.resume_macro||''}</p>
  </div>`;

  if(r.top_opportunites?.length){
    html+=`<div style="font-size:8px;color:#2a2a40;letter-spacing:3px;margin-bottom:10px">🎯 TOP OPPORTUNITÉS</div>`;
    r.top_opportunites.forEach(op=>{
      const isLong=op.direction==='ACHETER',dc=isLong?'#00ff88':'#ff4444';
      html+=`<div style="background:#07071a;border:2px solid ${dc}30;border-left:4px solid ${dc};border-radius:11px;padding:14px 16px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:15px;font-weight:900;color:#fff;font-family:monospace">${op.paire}</span>
          <span style="font-size:12px;font-weight:900;color:${dc}">${isLong?'🟢':'🔴'} ${op.direction} — ${op.score_opportunite}/100</span>
        </div>
        <p style="font-size:11px;color:#777;margin:0 0 10px">${op.raison||''}</p>
        <button onclick="analyzeFromEnquete('${op.paire}')" style="width:100%;background:${dc}20;border:2px solid ${dc}40;color:${dc};border-radius:7px;padding:9px;font-size:11px;font-weight:700;font-family:monospace;cursor:pointer">⚡ Analyser ${op.paire}</button>
      </div>`;
    });
  }

  if(r.conseil_du_jour) html+=`<div style="background:#a78bfa10;border:1px solid #a78bfa25;border-radius:10px;padding:12px 16px"><p style="font-size:11px;color:#a78bfacc;margin:0;font-style:italic">💡 "${r.conseil_du_jour}"</p></div>`;
  document.getElementById('enqueteResult').innerHTML=html;
}

function analyzeFromEnquete(pair){
  selectedPair=pair;
  document.querySelectorAll('.pair-btn').forEach(b=>{b.classList.remove('active');if(b.textContent===pair)b.classList.add('active');});
  showTab('orchestrateur',document.querySelectorAll('.tab')[1]);
  setTimeout(()=>launch(),100);
}

function setLoading(val){
  loading=val;
  document.getElementById('btnLaunch').disabled=val;
  document.getElementById('btnLaunch').textContent=val?'⟳ ANALYSE...':'▶ LANCER';
  const dot=document.getElementById('statusDot');
  const txt=document.getElementById('statusTxt');
  dot.style.animation=val?'pulse 1.4s ease infinite':'none';
  txt.textContent=val?'ANALYSE...':'PRÊT';
}

function renderStepBar(step,label){
  const colors=Object.values(COLORS);
  let html='<div class="step-bar">';
  STEPS.forEach((lbl,i)=>{
    const done=i<step,active=i===step,col=colors[i]||'#00ff88';
    html+=`<div class="step">
      <div class="step-circle" style="background:${done?col:active?col+'30':'#0d0d1f'};border:2px solid ${done||active?col:'#1a1a2e'};color:${done?'#000':active?col:'#333'};box-shadow:${active?'0 0 8px '+col:'none'}">${done?'✓':i+1}</div>
      <span class="step-label" style="color:${done||active?col:'#222'}">${lbl}</span>
    </div>`;
    if(i<STEPS.length-1) html+=`<div class="step-line" style="background:${done?col:'#0d0d1f'}"></div>`;
  });
  html+='</div>';
  if(label) html+=`<p style="text-align:center;font-size:9px;color:#444;font-family:monospace;margin-top:5px">${label}</p>`;
  const sb=document.getElementById('stepBar');
  sb.innerHTML=html; sb.style.display='block';
}

function renderAgentCard(key,data){
  const color=COLORS[key]||'#888',icon=ICONS[key]||'🤖';
  const pct=data.score_max>0?Math.round(data.score/data.score_max*100):0;
  let chips='';
  if(key==='liquidite') chips=`<span class="chip" style="background:#00d4ff20;border:1px solid #00d4ff40;color:#00d4ff">BSL: ${data.bsl||'—'}</span><span class="chip" style="background:#f8717120;border:1px solid #f8717140;color:#f87171">SSL: ${data.ssl||'—'}</span>`;
  if(key==='timing') chips=`<span class="chip" style="background:${data.kill_zone?'#34d39920':'#55555520'};border:1px solid ${data.kill_zone?'#34d39940':'#55555540'};color:${data.kill_zone?'#34d399':'#555'}">${data.kill_zone?'Kill Zone ✓':'Hors Kill Zone'}</span>`;
  if(key==='risk') chips=`<span class="chip" style="background:#00ff8820;border:1px solid #00ff8840;color:#00ff88">RR ${data.rr||'—'}</span><span class="chip" style="background:#f8717120;border:1px solid #f8717140;color:#f87171">SL ${data.sl||'—'}</span>`;
  if(key==='eco') chips=`<span class="chip" style="background:#10b98120;border:1px solid #10b98140;color:#10b981">Biais: ${data.biais_fondamental||'—'}</span>`;
  return `<div class="agent-card" style="border:1px solid ${color}22">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:7px"><span style="font-size:14px">${icon}</span><span style="font-size:10px;font-weight:700;color:${color};font-family:monospace">${data.nom||key}</span></div>
      <span style="font-size:13px;font-weight:800;color:${color};font-family:monospace">${data.score}<span style="font-size:9px;color:#333">/${data.score_max}</span></span>
    </div>
    <div class="agent-bar"><div class="agent-fill" style="width:${pct}%;background:${color}"></div></div>
    <p style="font-size:10px;color:#777;line-height:1.5;margin:0 0 8px;font-style:italic">${data.analyse||''}</p>
    <div style="background:${color}12;border:1px solid ${color}25;border-radius:6px;padding:5px 9px;font-size:10px;color:${color}cc">▸ ${data.verdict||''}</div>
    ${chips?`<div style="margin-top:7px;display:flex;gap:4px;flex-wrap:wrap">${chips}</div>`:''}
  </div>`;
}

async function launch(forcePair){
  const targetPair=forcePair||selectedPair;
  if(loading) return;
  setLoading(true);
  document.getElementById('errorBox').style.display='none';
  document.getElementById('smcData').style.display='none';
  document.getElementById('signalBanner').innerHTML='';
  document.getElementById('agentGrid').style.display='none';
  document.getElementById('agentCards').innerHTML='';
  document.getElementById('decisionPanel').innerHTML='';

  const now=new Date(),h=now.getHours();
  const sess=h>=7&&h<10?'London Open':h>=13&&h<16?'NY Open':h>=2&&h<6?'Asian Session':'Inter-session';
  const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const results={};

  try{
    // Données marché
    renderStepBar(0,'📡 Données marché...');
    let smcData=null;
    try{
      const PAIR_SRC={"EUR/USD":{s:"EUR/USD",t:"td"},"GBP/USD":{s:"GBP/USD",t:"td"},"USD/JPY":{s:"USD/JPY",t:"td"},"GBP/JPY":{s:"GBP/JPY",t:"td"},"EUR/GBP":{s:"EUR/GBP",t:"td"},"EUR/JPY":{s:"EUR/JPY",t:"td"},"USD/CAD":{s:"USD/CAD",t:"td"},"USD/CHF":{s:"USD/CHF",t:"td"},"AUD/USD":{s:"AUD/USD",t:"td"},"NZD/USD":{s:"NZD/USD",t:"td"},"GBP/CHF":{s:"GBP/CHF",t:"td"},"XAU/USD":{s:"XAU/USD",t:"td"},"XAG/USD":{s:"XAG/USD",t:"td"},"WTI":{s:"WTI/USD",t:"td"},"BRENT":{s:"BRENT/USD",t:"td"},"NAS100":{s:"NDX",t:"td"},"SPX500":{s:"SPX",t:"td"},"DAX40":{s:"DAX",t:"td"},"BTC/USD":{s:"BTCUSDT",t:"bnb"},"ETH/USD":{s:"ETHUSD",t:"bnb"},"BNB/USD":{s:"BNBUSDT",t:"bnb"},"SOL/USD":{s:"SOLUSDT",t:"bnb"},"XRP/USD":{s:"XRPUSDT",t:"bnb"},"ADA/USD":{s:"ADAUSDT",t:"bnb"}};
      const TF_SRC={"M15":{td:"15min",bnb:"15m"},"H1":{td:"1h",bnb:"1h"},"H4":{td:"4h",bnb:"4h"},"Daily":{td:"1day",bnb:"1d"}};
      const pc=PAIR_SRC[targetPair],tc=TF_SRC[selectedTf];
      let candles;
      if(pc.t==='bnb'){const r=await fetch('https://api.binance.com/api/v3/klines?symbol='+pc.s+'&interval='+tc.bnb+'&limit=50');const d=await r.json();candles=d.map(c=>({open:+c[1],high:+c[2],low:+c[3],close:+c[4]}));}
      else{const r=await fetch('https://api.twelvedata.com/time_series?symbol='+encodeURIComponent(pc.s)+'&interval='+tc.td+'&outputsize=50&apikey='+TD_KEY);const d=await r.json();if(d.status==='error')throw new Error(d.message);candles=d.values.slice().reverse().map(c=>({open:+c.open,high:+c.high,low:+c.low,close:+c.close}));}
      const w=candles.slice(-20),last=w[w.length-1];
      const hi=Math.max(...w.map(c=>c.high)),lo=Math.min(...w.map(c=>c.low)),mid=(hi+lo)/2;
      smcData={price:last.close.toFixed(5),bsl:hi.toFixed(5),ssl:lo.toFixed(5),trend:last.close>w[0].open?'bullish':'bearish',zone:last.close>mid?'premium':'discount'};
      const sd=document.getElementById('smcData');
      sd.innerHTML=`<div style="font-size:7px;color:#10b981;letter-spacing:3px;margin-bottom:8px">📡 DONNÉES — ${targetPair} ${selectedTf}</div><div class="data-grid">${[['PRIX',smcData.price,'#fff'],['BSL',smcData.bsl,'#00d4ff'],['SSL',smcData.ssl,'#f87171'],['TREND',smcData.trend,smcData.trend==='bullish'?'#00ff88':'#f87171'],['ZONE',smcData.zone,smcData.zone==='premium'?'#f87171':'#00ff88']].map(([k,v,c])=>`<div class="data-box"><div style="font-size:7px;color:#222;letter-spacing:1.5px;margin-bottom:2px">${k}</div><div style="font-size:10px;font-weight:700;color:${c};font-family:monospace">${v}</div></div>`).join('')}</div>`;
      sd.style.display='block';
    }catch(e){}

    // Agents
    for(let i=0;i<AGENT_KEYS.length;i++){
      const key=AGENT_KEYS[i];
      renderStepBar(i,ICONS[key]+' Agent '+(i+1)+'/8...');
      try{
        const ctx='Paire:'+targetPair+' TF:'+selectedTf+' Session:'+sess+' Jour:'+days[now.getDay()]+(smcData?' prix='+smcData.price+' trend='+smcData.trend+' zone='+smcData.zone:'')+' JSON uniquement.';
        results[key]=await aiCall(getSys(key),ctx);
      }catch(e){results[key]={nom:key,analyse:'Erreur: '+e.message,score:0,score_max:20,verdict:'Indisponible'};}
      document.getElementById('agentCards').innerHTML+=renderAgentCard(key,results[key]);
      document.getElementById('agentGrid').style.display='block';
      await new Promise(r=>setTimeout(r,200));
    }

    // Orchestrateur
    renderStepBar(8,'⚡ Synthèse...');
    const total=Object.values(results).reduce((s,a)=>s+(a.score||0),0);
    const dec=total>=86?'EXECUTION':total>=61?'SIGNAL':'ATTENDRE';
    const sum=Object.values(results).map(a=>(a.nom||'?')+':'+(a.score||0)).join(' ');
    const sys=`Orchestrateur SMC. JSON: {"score_total":${total},"decision":"${dec}","bias":"short","raisonnement":"...","confluence":"...","invalidation":"...","entry":"1.08420","sl":"1.08200","tp":"1.08800","rr":"2.5:1","taille":"1%","message":"..."}`;
    const o=await aiCall(sys,targetPair+' '+selectedTf+' | '+sum,1000);
    o.pair=targetPair; o.tf=selectedTf;

    renderStepBar(9,'');
    renderDecision(o);

    // Telegram si signal
    if((o.score_total||0)>=65&&o.decision!=='ATTENDRE'){
      const isLong=o.bias==='long';
      const msg=`⚡ <b>SIGNAL TRADING MASTER V5</b>\n━━━━━━━━━━━━━━\n${isLong?'🟢 <b>ACHETER</b>':'🔴 <b>VENDRE</b>'} <b>${targetPair}</b>\n📊 ${selectedTf} | Score: <b>${o.score_total||0}/100</b>\n━━━━━━━━━━━━━━\n📍 Entrée: <b>${o.entry||'—'}</b>\n🛡️ SL: <b>${o.sl||'—'}</b>\n🎯 TP: <b>${o.tp||'—'}</b>\n⚖️ RR: <b>${o.rr||'—'}</b>\n━━━━━━━━━━━━━━\n📱 Ouvre MT4 !`;
      await sendTelegram(msg);
    }

    // Sauvegarder
    const t={id:Date.now(),date:new Date().toLocaleString('fr-FR'),pair:targetPair,tf:selectedTf,score:o.score_total||0,decision:o.decision||'ATTENDRE',bias:o.bias||'',entry:o.entry||'',sl:o.sl||'',tp:o.tp||'',rr:o.rr||'',outcome:null};
    trades.unshift(t); lastId=t.id;
    if(trades.length>100) trades=trades.slice(0,100);

  }catch(e){
    const eb=document.getElementById('errorBox');
    eb.textContent='⚠ '+e.message; eb.style.display='block';
    document.getElementById('stepBar').style.display='none';
  }
  setLoading(false);
}

function renderDecision(o){
  const cfg={ATTENDRE:{icon:'⏳',color:'#ff4444',label:'ATTENDRE',sub:'Setup insuffisant'},SIGNAL:{icon:'👁️',color:'#f5c518',label:'SIGNAL DÉTECTÉ',sub:'Attendre confirmation'},EXECUTION:{icon:'⚡',color:'#00ff88',label:'EXÉCUTION POSSIBLE',sub:'Setup haute probabilité'}};
  const c=cfg[o.decision]||cfg.ATTENDRE;

  // Signal banner
  if((o.score_total||0)>=65&&o.decision!=='ATTENDRE'){
    const isLong=o.bias==='long',cl=isLong?'#00ff88':'#ff4444';
    document.getElementById('signalBanner').innerHTML=`<div class="signal-banner" style="background:${cl}15;border:3px solid ${cl};box-shadow:0 0 30px ${cl}20">
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:28px;font-weight:900;color:${cl};font-family:monospace;letter-spacing:2px;margin-bottom:4px">${isLong?'🟢 ACHETER':'🔴 VENDRE'}</div>
      </div>
      <div class="signal-grid">
        ${[['📍 ENTRÉE',o.entry,'#f5c518'],['🛡️ STOP LOSS',o.sl,'#ff4444'],['🎯 TAKE PROFIT',o.tp,'#00ff88'],['⚖️ R:R',o.rr,'#a78bfa']].map(([k,v,col])=>`<div class="signal-box" style="background:#06060f;border:2px solid ${col}30"><div style="font-size:8px;color:${col};letter-spacing:2px;margin-bottom:4px">${k}</div><div style="font-size:18px;font-weight:900;color:${col};font-family:monospace">${v||'—'}</div></div>`).join('')}
      </div>
    </div>`;
  }

  // Decision panel
  document.getElementById('decisionPanel').innerHTML=`<div style="font-size:7px;color:#1a1a30;letter-spacing:3px;margin-bottom:10px">DÉCISION FINALE</div>
  <div class="decision-panel" style="background:${c.color}06;border:2px solid ${c.color}40">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap">
      <div style="width:48px;height:48px;border-radius:11px;background:${c.color}18;border:2px solid ${c.color}30;display:flex;align-items:center;justify-content:center;font-size:22px">${c.icon}</div>
      <div style="flex:1">
        <div style="font-size:8px;color:#333;letter-spacing:3px;margin-bottom:2px">DÉCISION ORCHESTRATEUR</div>
        <div style="font-size:17px;font-weight:900;color:${c.color};font-family:monospace">${c.label}</div>
        <div style="font-size:10px;color:#555;margin-top:2px">${c.sub}</div>
      </div>
      <div style="font-size:32px;font-weight:900;color:${c.color};font-family:monospace">${o.score_total||0}<span style="font-size:14px;color:#333">/100</span></div>
    </div>
    <div style="background:#06060f;border-radius:9px;padding:11px 13px;margin-bottom:10px">
      <div style="font-size:8px;color:#222;letter-spacing:2px;margin-bottom:4px">RAISONNEMENT</div>
      <p style="font-size:11px;color:#999;line-height:1.7;margin:0">${o.raisonnement||''}</p>
    </div>
    <div class="decision-row">
      <div style="padding:9px 11px;background:#00ff8806;border:1px solid #00ff8820;border-radius:7px">
        <div style="font-size:7px;color:#00ff8866;letter-spacing:2px;margin-bottom:3px">CONFLUENCE</div>
        <div style="font-size:10px;color:#00ff88bb">${o.confluence||''}</div>
      </div>
      <div style="padding:9px 11px;background:#ff444406;border:1px solid #ff444420;border-radius:7px">
        <div style="font-size:7px;color:#ff444466;letter-spacing:2px;margin-bottom:3px">INVALIDATION</div>
        <div style="font-size:10px;color:#ff4444bb">${o.invalidation||''}</div>
      </div>
    </div>
    ${o.message?`<div style="margin-top:10px;padding:9px 13px;background:${c.color}08;border:1px solid ${c.color}20;border-radius:7px"><p style="font-size:11px;color:${c.color}bb;margin:0;font-style:italic">"${o.message}"</p></div>`:''}
    ${lastId?`<div style="margin-top:14px;padding:12px;background:#07071a;border:1px solid #00ff8830;border-radius:10px">
      <div style="font-size:8px;color:#00ff88;letter-spacing:2px;margin-bottom:8px">RÉSULTAT DE CE TRADE ?</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        <button onclick="markOutcome(${lastId},'win')" style="background:#00ff8818;border:1px solid #00ff8840;color:#00ff88;border-radius:6px;padding:7px 12px;font-size:10px;font-weight:700;cursor:pointer">✅ Gagné</button>
        <button onclick="markOutcome(${lastId},'loss')" style="background:#f8717118;border:1px solid #f8717140;color:#f87171;border-radius:6px;padding:7px 12px;font-size:10px;font-weight:700;cursor:pointer">❌ Perdu</button>
        <button onclick="markOutcome(${lastId},'be')" style="background:#88888818;border:1px solid #88888840;color:#888;border-radius:6px;padding:7px 12px;font-size:10px;font-weight:700;cursor:pointer">➖ BE</button>
      </div>
    </div>`:''}
  </div>`;
}

function markOutcome(id,outcome){
  const t=trades.find(x=>x.id===id);
  if(t){t.outcome=outcome;lastId=null;}
  renderDecision(trades[0]||{});
}

function renderTrades(){
  const DC={ATTENDRE:'#ff4444',SIGNAL:'#f5c518',EXECUTION:'#00ff88'};
  const OC={win:'#00ff88',loss:'#f87171',be:'#888'};
  if(!trades.length){document.getElementById('tradesList').innerHTML='<div style="text-align:center;padding:40px;color:#222;font-size:11px">Aucune analyse. Lance l\'Enquêteur ou l\'Orchestrateur.</div>';return;}
  document.getElementById('tradesList').innerHTML=trades.slice(0,50).map(t=>`
    <div class="trade-item">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${t.entry?5:0}px">
        <div style="display:flex;gap:7px;align-items:center">
          <span style="font-size:10px;font-weight:700;color:#fff;font-family:monospace">${t.pair}</span>
          <span style="font-size:8px;color:#333;font-family:monospace">${t.tf}</span>
          <span style="font-size:8px;color:#1a1a2e">${t.date}</span>
        </div>
        <div style="display:flex;gap:5px;align-items:center">
          <span style="font-size:11px;font-weight:800;color:${DC[t.decision]||'#888'};font-family:monospace">${t.score}/100</span>
          <span style="font-size:8px;color:${DC[t.decision]};background:${(DC[t.decision]||'#888')}15;border-radius:3px;padding:1px 5px">${t.decision}</span>
          ${t.outcome?`<span style="font-size:8px;color:${OC[t.outcome]};background:${OC[t.outcome]}15;border-radius:3px;padding:1px 5px">${t.outcome.toUpperCase()}</span>`:''}
        </div>
      </div>
      ${t.entry?`<div style="display:flex;gap:7px;flex-wrap:wrap">
        <span style="font-size:8px;color:#f5c518;font-family:monospace">E:${t.entry}</span>
        <span style="font-size:8px;color:#f87171;font-family:monospace">SL:${t.sl}</span>
        <span style="font-size:8px;color:#00ff88;font-family:monospace">TP:${t.tp}</span>
        <span style="font-size:8px;color:#a78bfa;font-family:monospace">RR:${t.rr}</span>
      </div>`:''}
    </div>`).join('');
}

function renderStats(){
  if(!trades.length){document.getElementById('statsContent').innerHTML='<div style="text-align:center;padding:40px;color:#222;font-size:11px">Lance des analyses et marque les résultats.</div>';return;}
  const done=trades.filter(t=>t.outcome);
  const wins=done.filter(t=>t.outcome==='win').length;
  const wr=done.length>0?Math.round(wins/done.length*100):0;
  const sigs=trades.filter(t=>t.decision!=='ATTENDRE').length;
  document.getElementById('statsContent').innerHTML=`
    <div class="stat-grid">
      ${[['ANALYSES',trades.length,'#fff'],['SIGNAUX',sigs,'#f5c518'],['GAGNÉS',wins,'#00ff88'],['PERDUS',done.length-wins,'#f87171'],['WINRATE',wr+'%','#00ff88']].map(([k,v,c])=>`<div class="stat-box"><div style="font-size:7px;color:#222;letter-spacing:2px;margin-bottom:5px">${k}</div><div style="font-size:20px;font-weight:900;color:${c};font-family:monospace">${v}</div></div>`).join('')}
    </div>`;
}

// Init
initControls();
</script>
